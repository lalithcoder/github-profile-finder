<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>GitHub Profile Finder</h1>

        <div class="search-box">
            <input type="text" id="username" placeholder="Enter GitHub username">
            <button id="Searchbutton">Search</button>
        </div>

        <!-- Profile Card -->
        <div class="profile-card">
            <img id="image" src="https://via.placeholder.com/150" alt="Profile Image">

            <div class="profile-info">
                <h2 id="username-display">Username</h2>

                <p id="bio">
                    Frontend Developer | Open Source Enthusiast
                </p>

                <a id="github-link" href="#" target="_blank">
                    View GitHub Profile
                </a>

                <div class="stats">
                    <div>
                        <h3 id="repo-display">120</h3>
                        <span>Repos</span>
                    </div>

                    <div>
                        <h3 id="follower-display">450</h3>
                        <span>Followers</span>
                    </div>

                    <div>
                        <h3 id="following-display">180</h3>
                        <span>Following</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Repositories Section -->
        <div class="repositories">
            <h2>Repositories</h2>

            <div id="repo-list">

                

            </div>
        </div>

    </div>

    <script src="./index.js"></script>
</body> 
</html>
